<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天不練，明天掏錢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--b3:rgba(255,255,255,.2);
  --t:#efefef;--t2:#888;--t3:#444;
  --acc:#e8ff57;--acc-d:rgba(232,255,87,.1);
  --red:#ff5252;--red-d:rgba(255,82,82,.08);
  --grn:#3dffad;--grn-d:rgba(61,255,173,.08);
  --blu:#52b8ff;--blu-d:rgba(82,184,255,.08);
  --ora:#ffaa3d;
  --r:12px;--rs:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}
.page{display:none;position:fixed;inset:0;overflow-y:auto;background:var(--bg)}
.page.on{display:block}
#pg-login{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem}
#pg-login.on{display:flex}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
#loading.hide{opacity:0;pointer-events:none}
.spin{width:32px;height:32px;border:2px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtxt{font-size:13px;color:var(--t2)}

/* LOGIN */
.llogo{font-size:11px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px;width:100%;max-width:480px}
.llogo::before{content:'';width:7px;height:7px;background:var(--acc);border-radius:50%}
.ltitle{font-size:32px;font-weight:900;letter-spacing:-.04em;margin-bottom:.4rem;line-height:1.15;width:100%;max-width:480px}
.lsub{font-size:13px;color:var(--t2);margin-bottom:2rem;width:100%;max-width:480px}
.mcards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:480px}
.mcard{background:var(--bg2);border:2px solid var(--b);border-radius:var(--r);padding:20px 16px;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.mcard:hover{transform:translateY(-2px);background:var(--bg3)}
.mcard:active{transform:translateY(0)}
.mcard-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.mcard-name{font-size:15px;font-weight:600}
.mcard-role{font-size:11px;color:var(--t3)}
.mcard-arr{font-size:16px;color:var(--t3)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(12,12,12,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--b);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem}
.tb-l{display:flex;align-items:center;gap:8px}
.tb-dot{width:7px;height:7px;background:var(--acc);border-radius:50%}
.tb-brand{font-size:13px;font-weight:700}
.tb-tabs{display:flex;gap:4px}
.tbtab{padding:5px 12px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.tbtab:hover{color:var(--t)}
.tbtab.on{background:var(--bg3);border-color:var(--b2);color:var(--t)}
.tb-r{display:flex;align-items:center;gap:7px}
.tb-user{font-size:12px;color:var(--t2)}
.tb-user strong{color:var(--t);font-weight:500}
.smbtn{padding:5px 10px;background:transparent;border:1px solid var(--b);border-radius:6px;color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.smbtn:hover{border-color:var(--b2);color:var(--t)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.sdot.live{background:var(--grn)}.sdot.err{background:var(--red)}

/* TABS */
.tab{display:none}.tab.on{display:block}
.wrap{max-width:860px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

/* WEEK NAV */
.wknav{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:10px 13px;margin-bottom:1.25rem}
.wkbtn{width:28px;height:28px;background:transparent;border:1px solid var(--b);border-radius:6px;color:var(--t2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wkbtn:hover:not(:disabled){border-color:var(--b2);color:var(--t)}
.wkbtn:disabled{opacity:.2;cursor:not-allowed}
.wkinfo{text-align:center}
.wklbl{font-size:15px;font-weight:700}
.wkdates{font-size:11px;color:var(--t2);font-family:'DM Mono',monospace;margin-top:2px}
.wkhint{font-size:10px;color:var(--ora);margin-top:2px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:13px 15px}
.clbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.cval{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}
.ca{color:var(--acc)}.cr{color:var(--red)}.cg{color:var(--grn)}.co{color:var(--ora)}
.sec{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}

/* MY CARD */
.mycard{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:1.5rem}
.myhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.myl{display:flex;align-items:center;gap:10px}

/* BANNER */
.banner{border-radius:var(--rs);padding:11px 14px;margin-bottom:12px;display:none}
.banner.on{display:block}
.banner.ok{background:var(--grn-d);border:1px solid rgba(61,255,173,.2)}
.banner.warn{background:var(--red-d);border:1px solid rgba(255,82,82,.2)}
.banner.lv{background:var(--blu-d);border:1px solid rgba(82,184,255,.2)}
.bnrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.bntag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.bntag.g{color:var(--grn)}.bntag.r{color:var(--red)}.bntag.b{color:var(--blu)}
.bndesc{font-size:13px;color:var(--t2)}.bnnote{font-size:11px;color:var(--t3);margin-top:3px}
.bnamt{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.bnamt.r{color:var(--red)}.bnamt.g{color:var(--grn)}.bnamt.b{color:var(--blu)}

/* DAYS */
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px}
.dc{border-radius:8px;border:1px solid var(--b);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 3px;cursor:pointer;transition:all .15s;aspect-ratio:.8}
.dc:hover:not(.dcf):not(.dcro){border-color:var(--b2)}
.dc.dcok{background:var(--grn-d);border-color:rgba(61,255,173,.35)}
.dc.dclv{background:var(--blu-d);border-color:rgba(82,184,255,.3)}
.dc.dcf{opacity:.25;cursor:not-allowed;pointer-events:none}
.dc.dctd{border-color:var(--acc)}.dc.dcro{cursor:default}
.dcday{font-size:9px;color:var(--t3);margin-bottom:1px}
.dcdate{font-size:11px;font-family:'DM Mono',monospace;color:var(--t2)}
.dcico{font-size:13px;margin-top:2px}
.dc.dcok .dcday,.dc.dcok .dcdate{color:var(--grn)}
.dc.dclv .dcday,.dc.dclv .dcdate{color:var(--blu)}
.dc.dctd .dcday{color:var(--acc)}

/* ACTIONS */
.arow{display:flex;gap:7px;flex-wrap:wrap}
.abtn{padding:7px 14px;border-radius:6px;border:1px solid var(--b);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.abtn:hover{border-color:var(--b2);color:var(--t)}
.abtn.ap{background:var(--acc);border-color:var(--acc);color:#0c0c0c;font-weight:700}
.abtn.ap:hover{opacity:.88}
.abtn.ad{border-color:rgba(255,82,82,.25);color:var(--red)}.abtn.ad:hover{background:var(--red-d)}
.abtn.ab{border-color:rgba(82,184,255,.3);color:var(--blu)}.abtn.ab:hover{background:var(--blu-d)}
.abtn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* MEMBERS */
.mlist{display:flex;flex-direction:column;gap:7px}
.mc{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:13px 15px}
.mchdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.mcl{display:flex;align-items:center;gap:9px}
.mcname{font-size:14px;font-weight:500}.mcrole{font-size:10px;color:var(--t3);margin-top:1px}
.mcpills{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.pill{padding:3px 8px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500}
.pok{background:var(--grn-d);color:var(--grn);border:1px solid rgba(61,255,173,.18)}
.pw{background:var(--red-d);color:var(--red);border:1px solid rgba(255,82,82,.18)}
.pb{background:var(--blu-d);color:var(--blu);border:1px solid rgba(82,184,255,.18)}
.pg{background:rgba(255,255,255,.04);color:var(--t2);border:1px solid var(--b)}
.prog{height:2px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:7px}
.progf{height:100%;border-radius:2px;transition:width .4s}
.mini{display:flex;gap:3px}
.md{flex:1;height:5px;border-radius:2px;background:var(--bg4)}
.md.ok{background:var(--grn)}.md.lv{background:var(--blu)}.md.td{background:var(--b3)}

/* LEADERBOARD */
.lbwrap{max-width:860px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.lbtitle{font-size:26px;font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem}
.lbsub{font-size:13px;color:var(--t2);margin-bottom:1.5rem}
.mtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.mtab{padding:6px 14px;border:1px solid var(--b);border-radius:20px;background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.mtab:hover{border-color:var(--b2);color:var(--t)}
.mtab.on{background:var(--acc);border-color:var(--acc);color:#0c0c0c;font-weight:600}
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.scard{background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);padding:12px 14px}
.sclbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.scval{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.rcard{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.rcard:hover{border-color:var(--b2)}
.rnum{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;width:32px;text-align:center;flex-shrink:0}
.r1 .rnum{color:#FFD700}.r2 .rnum{color:#C0C0C0}.r3 .rnum{color:#CD7F32}
.rinfo{flex:1;min-width:0}
.rname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rdetail{font-size:11px;color:var(--t2);margin-top:2px;font-family:'DM Mono',monospace}
.rbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.rright{text-align:right;flex-shrink:0}
.rscore{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}
.rscl{font-size:10px;color:var(--t3);margin-top:1px}
.sbar{display:flex;gap:3px;margin-top:6px}
.sdot2{width:9px;height:9px;border-radius:50%;background:var(--bg4)}
.sdot2.hit{background:var(--grn)}.sdot2.lv2{background:var(--blu)}.sdot2.miss{background:rgba(255,82,82,.4);border:1px solid rgba(255,82,82,.3)}

/* MODALS */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.ovl.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:22px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto}
.mtitle{font-size:16px;font-weight:700;margin-bottom:5px}
.msub{font-size:12px;color:var(--t2);margin-bottom:16px}
.mopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mopt{padding:11px 8px;border:1px solid var(--b);border-radius:var(--rs);background:var(--bg3);cursor:pointer;text-align:center;font-size:13px;color:var(--t2);transition:all .15s;font-family:inherit}
.mopt:hover{border-color:var(--b2);color:var(--t)}
.mopt.sok{border-color:var(--grn);background:var(--grn-d);color:var(--grn)}
.macts{display:flex;gap:8px;justify-content:flex-end}
.mcancel{padding:7px 13px;background:transparent;border:1px solid var(--b);border-radius:6px;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit}
.mconfirm{padding:7px 13px;background:var(--acc);border:none;border-radius:6px;color:#0c0c0c;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.serow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.serow input{flex:1;padding:8px 10px;background:var(--bg3);border:1px solid var(--b);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.serow input:focus{border-color:var(--b2)}
.delbtn{width:28px;height:28px;background:transparent;border:1px solid rgba(255,82,82,.2);border-radius:6px;color:var(--red);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.delbtn:hover{background:var(--red-d)}
.addrow{display:flex;gap:8px;margin-top:8px}
.addrow input{flex:1;padding:8px 10px;background:var(--bg3);border:1px solid var(--b);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.addrow input:focus{border-color:var(--b2)}
.addbtn{padding:8px 13px;background:var(--bg3);border:1px solid var(--b);border-radius:6px;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.addbtn:hover{border-color:var(--b2);color:var(--t)}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);padding:9px 18px;font-size:13px;z-index:300;transition:transform .25s;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

@media(max-width:600px){
  .mcards{grid-template-columns:repeat(2,1fr)}
  .stat4{grid-template-columns:repeat(2,1fr)}
  .dc{padding:5px 2px}.dcday{font-size:8px}.dcdate{font-size:10px}.dcico{font-size:11px}
  .cval{font-size:17px}.tb-tabs{display:none}.ltitle{font-size:26px}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="ldtxt" id="ldtxt">連線中…</div>
</div>

<!-- LOGIN -->
<div id="pg-login" class="page">
  <div class="llogo">運動打卡系統</div>
  <h1 class="ltitle">今天不練，<br>明天掏錢</h1>
  <p class="lsub">點選你的名字進入打卡</p>
  <div class="mcards" id="mgrid"></div>
</div>

<!-- APP -->
<div id="pg-app" class="page">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-dot"></div>
      <span class="tb-brand">今天不練，明天掏錢</span>
    </div>
    <div class="tb-tabs">
      <button class="tbtab on" id="tbbck" onclick="showTab('ck')">📅 打卡</button>
      <button class="tbtab" id="tbblb" onclick="showTab('lb')">🏆 排行榜</button>
    </div>
    <div class="tb-r">
      <div class="sdot" id="sdot"></div>
      <span class="tb-user">Hi <strong id="tbnm"></strong></span>
      <button class="smbtn" onclick="openSet()">⚙</button>
      <button class="smbtn" onclick="doLogout()">切換</button>
    </div>
  </div>

  <div id="tab-ck" class="tab on">
    <div class="wrap">
      <div class="wknav">
        <button class="wkbtn" id="btn-prev" onclick="chWk(-1)">‹</button>
        <div class="wkinfo">
          <div class="wklbl" id="wklbl"></div>
          <div class="wkdates" id="wkdates"></div>
          <div class="wkhint" id="wkhint"></div>
        </div>
        <button class="wkbtn" id="btn-next" onclick="chWk(1)">›</button>
      </div>
      <div class="cards">
        <div class="card"><div class="clbl">我的本週</div><div class="cval ca" id="cmy">0/3</div></div>
        <div class="card"><div class="clbl">本週要繳</div><div class="cval cr" id="cfine">NT$0</div></div>
        <div class="card"><div class="clbl">全員罰款</div><div class="cval co" id="ctot">NT$0</div></div>
      </div>
      <div class="sec" id="mysec"></div>
      <div class="mycard">
        <div class="myhdr">
          <div class="myl">
            <div class="av" id="myav" style="width:36px;height:36px;font-size:14px"></div>
            <div>
              <div style="font-size:14px;font-weight:600" id="mynm"></div>
              <div style="font-size:10px;color:var(--t3)" id="myrole"></div>
            </div>
          </div>
          <div style="font-size:13px;color:var(--t2)">本週 <strong id="myn" style="color:var(--t)">0</strong>/3</div>
        </div>
        <div class="banner" id="banner">
          <div class="bnrow">
            <div><div class="bntag" id="bntag"></div><div class="bndesc" id="bndesc"></div><div class="bnnote" id="bnnote"></div></div>
            <div class="bnamt" id="bnamt"></div>
          </div>
        </div>
        <div class="dgrid" id="mydays"></div>
        <div class="arow">
          <button class="abtn ap" id="btnck" onclick="openCk()">＋ 打卡</button>
          <button class="abtn ab" id="btnlv" onclick="doLeave()">📋 本週請假</button>
          <button class="abtn ad" id="btnclr" style="display:none" onclick="clearToday()">✕ 清除今日</button>
        </div>
      </div>
      <div class="sec">所有成員進度</div>
      <div class="mlist" id="mlist"></div>
    </div>
  </div>

  <div id="tab-lb" class="tab">
    <div class="lbwrap">
      <div class="lbtitle">🏆 排行榜</div>
      <div class="lbsub">綠點=達標・藍點=請假・紅點=缺席</div>
      <div class="mtabs" id="mtabs"></div>
      <div class="stat4" id="lbstats"></div>
      <div class="sec">成員排名</div>
      <div id="ranklist"></div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="ovl" id="ovlck">
  <div class="modal">
    <div class="mtitle">新增打卡</div>
    <div class="msub">選擇已完成運動的日期</div>
    <div class="mopts" id="ckopts"></div>
    <div class="macts">
      <button class="mcancel" onclick="closeAll()">取消</button>
      <button class="mconfirm" onclick="confirmCk()">確認</button>
    </div>
  </div>
</div>

<div class="ovl" id="ovlset">
  <div class="modal">
    <div class="mtitle">成員設定</div>
    <div class="msub">修改名稱或新增成員</div>
    <div id="setlist"></div>
    <div class="addrow">
      <input id="setnew" placeholder="新成員姓名" maxlength="8">
      <button class="addbtn" onclick="setAdd()">＋ 新增</button>
    </div>
    <div class="macts" style="margin-top:14px">
      <button class="mcancel" onclick="closeAll()">取消</button>
      <button class="mconfirm" onclick="setSave()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// ════════════════════════════════════════
// 🔧 填入你的 Firebase 設定
// ════════════════════════════════════════
const FB = {
  apiKey:            "AIzaSyBAOeBFFciJq8QryWQzbijESXHYwidSAFE",
  authDomain:        "exercise-tracker-ae086.firebaseapp.com",
  projectId:         "exercise-tracker-ae086",
  storageBucket:     "exercise-tracker-ae086.firebasestorage.app",
  messagingSenderId: "493175575135",
  appId:             "1:493175575135:web:3b72b54d052d7e6c3f41ea"
};
// ════════════════════════════════════════

import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── CONFIG ──────────────────────────────
const WEEK1=new Date(2026,3,27); WEEK1.setHours(0,0,0,0);
const PAY=200,MAX_PAY=600,NEED=3;
const DAYS=['一','二','三','四','五','六','日'];
const MEDALS=['🥇','🥈','🥉'];
const COLORS=[
  {c:'#e8ff57',bg:'rgba(232,255,87,.13)'},{c:'#52b8ff',bg:'rgba(82,184,255,.13)'},
  {c:'#ff5252',bg:'rgba(255,82,82,.13)'},{c:'#3dffad',bg:'rgba(61,255,173,.13)'},
  {c:'#ffaa3d',bg:'rgba(255,170,61,.13)'},{c:'#c97bff',bg:'rgba(201,123,255,.13)'},
  {c:'#ff7eb3',bg:'rgba(255,126,179,.13)'},{c:'#7bfff4',bg:'rgba(123,255,244,.13)'}
];

// ── STATE ───────────────────────────────
let me=null,wkOff=0,lbMk=null,fsdb=null;
let D={members:[],checkins:{},leaves:{}};

// ── FIREBASE ────────────────────────────
const configured = FB.apiKey !== "YOUR_API_KEY";

function initFB(){
  if(!configured){
    hideLoad(); showPage('login');
    D.members=defaultMembers();
    renderLogin();
    return;
  }
  const app=initializeApp(FB);
  fsdb=getFirestore(app);
  const ref=doc(fsdb,'exercise','shared');
  onSnapshot(ref, snap=>{
    setSdot('live');
    if(snap.exists()){
      const d=snap.data();
      D.members = d.members  || defaultMembers();
      D.checkins= d.checkins || {};
      D.leaves  = d.leaves   || {};
    } else {
      D.members=defaultMembers(); D.checkins={}; D.leaves={};
      push();
    }
    hideLoad();
    if(!me){ showPage('login'); renderLogin(); }
    else renderApp();
  }, err=>{ setSdot('err'); toast('連線錯誤'); console.error(err); });
}

async function push(){
  if(!fsdb) return;
  await setDoc(doc(fsdb,'exercise','shared'),{members:D.members,checkins:D.checkins,leaves:D.leaves,ts:Date.now()});
}

// ── HELPERS ─────────────────────────────
const defaultMembers=()=>[
  {id:'u1',name:'舒章綸',recorder:true},
  {id:'u2',name:'成員 A',recorder:false},
  {id:'u3',name:'成員 B',recorder:false},
  {id:'u4',name:'成員 C',recorder:false},
  {id:'u5',name:'成員 D',recorder:false}
];
const col=i=>COLORS[i%COLORS.length];
const getM=id=>D.members.find(m=>m.id===id);
const midx=id=>D.members.findIndex(m=>m.id===id);
const pad=n=>String(n).padStart(2,'0');
const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtS=d=>`${d.getMonth()+1}/${d.getDate()}`;
const mkey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
const mlabel=mk=>{ const[y,m]=mk.split('-'); return `${y}年${parseInt(m)}月`; };

function getMon(off){
  const t=new Date(); t.setHours(0,0,0,0);
  const dow=t.getDay(),diff=dow===0?-6:1-dow;
  const m=new Date(t); m.setDate(t.getDate()+diff+off*7);
  return m<WEEK1?new Date(WEEK1):m;
}
const wkNum=mon=>Math.floor((mon-WEEK1)/(7*86400000));
const wkDays=mon=>Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
const wkKey=mon=>fmt(mon);
function allWeeks(){
  const ws=[],t=new Date(); t.setHours(0,0,0,0);
  let m=new Date(WEEK1);
  while(m<=t){ ws.push(new Date(m)); m=new Date(m); m.setDate(m.getDate()+7); }
  return ws;
}
function allMonths(){ return [...new Set(allWeeks().map(mkey))].sort(); }

// ── LEAVE ───────────────────────────────
const isLv=(uid,mon)=>D.leaves[uid]?.[mkey(mon)]===wkKey(mon);
const canLv=(uid,mon)=>!D.leaves[uid]?.[mkey(mon)];
function toggleLv(uid,mon){
  const mk=mkey(mon);
  if(!D.leaves[uid]) D.leaves[uid]={};
  if(isLv(uid,mon)){ delete D.leaves[uid][mk]; return true; }
  if(!canLv(uid,mon)){ toast('這個月已經請過假了！'); return false; }
  D.leaves[uid][mk]=wkKey(mon); return true;
}

// ── CHECKIN ─────────────────────────────
const getSt=(uid,dk)=>D.checkins[uid]?.[dk]||null;
function setSt(uid,dk,v){
  if(!D.checkins[uid]) D.checkins[uid]={};
  if(v) D.checkins[uid][dk]=v; else delete D.checkins[uid][dk];
}
const cntCk=(uid,days)=>days.filter(d=>getSt(uid,fmt(d))==='checked').length;

// ── PENALTY ─────────────────────────────
function pen(uid,mon,days){
  const t=new Date(); t.setHours(0,0,0,0);
  const ended=t>days[6],onLv=isLv(uid,mon);
  if(onLv) return {onLv,ck:cntCk(uid,days),miss:0,amt:0,ended};
  const ck=cntCk(uid,days);
  if(ended){ const ms=Math.max(0,NEED-ck); return {onLv,ck,miss:ms,amt:Math.min(ms*PAY,MAX_PAY),ended}; }
  const rem=days.filter(d=>d>=t).length;
  const minM=Math.max(0,NEED-(ck+rem)),curM=Math.max(0,NEED-ck);
  return {onLv,ck,miss:curM,minMiss:minM,rem,amt:Math.min(curM*PAY,MAX_PAY),minAmt:Math.min(minM*PAY,MAX_PAY),ended:false};
}

// ── UI HELPERS ──────────────────────────
function hideLoad(){ const e=document.getElementById('loading'); e.classList.add('hide'); setTimeout(()=>e.style.display='none',300); }
function setSdot(s){ const e=document.getElementById('sdot'); if(e) e.className='sdot '+s; }
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{ p.classList.remove('on'); p.scrollTop=0; });
  const el=document.getElementById('pg-'+id);
  el.classList.add('on');
  el.scrollTop=0;
}
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
  document.querySelectorAll('.tbtab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tbb'+id).classList.add('on');
  if(id==='lb') renderLb();
}
function closeAll(){ document.querySelectorAll('.ovl').forEach(o=>o.classList.remove('on')); }
function toast(msg){
  const e=document.getElementById('toast');
  e.textContent=msg; e.classList.add('on');
  clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('on'),2400);
}

// ── LOGIN ────────────────────────────────
function renderLogin(){
  document.getElementById('mgrid').innerHTML=D.members.map((m,i)=>{
    const c=col(i);
    return `<div class="mcard" onclick="doLogin('${m.id}')" style="border-color:${c.c}33">
      <div class="mcard-av" style="background:${c.bg};color:${c.c}">${m.name[0]}</div>
      <div class="mcard-name">${m.name}</div>
      <div class="mcard-role">${m.recorder?'★ 記錄員':'成員'}</div>
      <div class="mcard-arr">→</div>
    </div>`;
  }).join('');
}
function doLogin(id){
  if(!getM(id)) return;
  me=id;
  showPage('app');
  document.getElementById('tbnm').textContent=getM(me).name;
  renderApp();
}
function doLogout(){ me=null; wkOff=0; showPage('login'); renderLogin(); }

// ── RENDER APP ───────────────────────────
function renderApp(){
  const t=new Date(); t.setHours(0,0,0,0);
  const mon=getMon(wkOff),days=wkDays(mon),num=wkNum(mon);
  const m=getM(me),i=midx(me),c=col(i);
  const isCur=wkOff===0,editable=isCur||(t.getDay()===1&&wkOff===-1);

  const pMon=new Date(mon); pMon.setDate(mon.getDate()-7);
  document.getElementById('btn-prev').disabled=pMon<WEEK1;
  document.getElementById('btn-next').disabled=wkOff>=0;
  document.getElementById('wklbl').textContent=num===0?'試用週（4/27–5/3）':`第 ${num} 週`;
  document.getElementById('wkdates').textContent=`${fmtS(days[0])}（一）— ${fmtS(days[6])}（日）`;
  document.getElementById('wkhint').textContent=(!isCur&&editable)?'📝 週一補登模式':'';

  document.getElementById('mysec').textContent=`我的打卡 — ${m.name}`;
  document.getElementById('mynm').textContent=m.name;
  document.getElementById('myrole').textContent=m.recorder?'★ 記錄員':'';
  const av=document.getElementById('myav');
  av.textContent=m.name[0]; av.style.background=c.bg; av.style.color=c.c;

  const p=pen(me,mon,days);
  document.getElementById('myn').textContent=p.ck;
  const myEl=document.getElementById('cmy');
  myEl.textContent=`${p.ck}/3`; myEl.className=`cval ${p.ck>=3||p.onLv?'cg':'ca'}`;
  const fEl=document.getElementById('cfine');
  fEl.textContent=`NT$${p.amt}`; fEl.className=`cval ${p.amt===0?'cg':'cr'}`;
  let tot=0; D.members.forEach(mm=>{ tot+=pen(mm.id,mon,days).amt; });
  const tEl=document.getElementById('ctot');
  tEl.textContent=`NT$${tot}`; tEl.className=`cval ${tot===0?'cg':'co'}`;

  renderBanner(p);
  renderDays(days,t,editable,mon);

  document.getElementById('btnck').disabled=!editable;
  document.getElementById('btnlv').disabled=!editable;
  document.getElementById('btnck').style.opacity=editable?'1':'.4';
  document.getElementById('btnlv').style.opacity=editable?'1':'.4';
  const lv=document.getElementById('btnlv');
  if(isLv(me,mon)){ lv.textContent='✓ 已請假'; lv.className='abtn ab'; }
  else{ lv.textContent='📋 本週請假'; lv.className='abtn'; }
  document.getElementById('btnclr').style.display=(getSt(me,fmt(t))==='checked'&&isCur)?'flex':'none';
  renderMembers(days,mon,t);
}

function renderBanner(p){
  const bn=document.getElementById('banner');
  const set=(cls,tc,tt,dt,nt,ac,at)=>{
    bn.className=`banner on ${cls}`;
    document.getElementById('bntag').className=`bntag ${tc}`;
    document.getElementById('bntag').textContent=tt;
    document.getElementById('bndesc').textContent=dt;
    document.getElementById('bnnote').textContent=nt;
    document.getElementById('bnamt').className=`bnamt ${ac}`;
    document.getElementById('bnamt').textContent=at;
  };
  if(p.onLv){ set('lv','b','📋 本週請假中','本週免罰款，本月請假額度已使用','','b','NT$0'); return; }
  if(p.ck>=3){ set('ok','g','✓ 本週達標',`已完成${p.ck}次，本週免罰款！`,'','g','NT$0'); return; }
  if(p.ended){ set('warn','r','⚠ 未達標',`完成${p.ck}次，缺${p.miss}次`,p.miss===3?'最高罰款 NT$600':'','r',`NT$${p.amt}`); return; }
  const need=Math.max(0,NEED-p.ck);
  if(need===0) set('ok','g','✓ 已達標','繼續保持！','','g','NT$0');
  else if(p.minMiss>0) set('warn','r','⚠ 確定被罰',`剩餘天數不足，最少缺${p.minMiss}次`,`若完全不去：NT$${p.amt}`,'r',`NT$${p.minAmt}`);
  else set('warn','r',`還差${need}次`,`已完成${p.ck}次，剩${p.rem}天需再${need}次`,`若今天起都沒去：NT$${p.amt}`,'r',`NT$${p.amt}`);
}

function renderDays(days,t,editable,mon){
  document.getElementById('mydays').innerHTML=days.map((d,i)=>{
    const dk=fmt(d),isT=d.getTime()===t.getTime(),isFut=d>t;
    const st=getSt(me,dk),onLv=isLv(me,mon);
    let cls='dc';
    if(onLv) cls+=' dclv'; else if(st==='checked') cls+=' dcok';
    if(isFut) cls+=' dcf'; if(isT) cls+=' dctd'; if(!editable) cls+=' dcro';
    const ico=onLv?'休':st==='checked'?'✓':'';
    const oc=editable&&!isFut&&!onLv?`tapDay('${dk}')` :'';
    return `<div class="${cls}" onclick="${oc}"><div class="dcday">${DAYS[i]}</div><div class="dcdate">${d.getDate()}</div>${ico?`<div class="dcico">${ico}</div>`:''}</div>`;
  }).join('');
}

function renderMembers(days,mon,t){
  document.getElementById('mlist').innerHTML=D.members.map((m,i)=>{
    const c=col(i),isMe=m.id===me,p=pen(m.id,mon,days);
    const pct=p.onLv?100:Math.min(100,Math.round(p.ck/3*100));
    let pills='';
    if(p.onLv) pills='<span class="pill pb">請假週</span>';
    else if(p.ck>=3) pills='<span class="pill pok">達標 ✓</span>';
    else pills=`<span class="pill pg">${p.ck}/3</span>`;
    if(p.amt>0) pills+=`<span class="pill pw">罰 $${p.amt}</span>`;
    const mini=days.map(d=>{
      const dk=fmt(d),st=getSt(m.id,dk),isT=d.getTime()===t.getTime(),lv=isLv(m.id,mon);
      return `<div class="md${lv?' lv':st==='checked'?' ok':isT?' td':''}"></div>`;
    }).join('');
    const bc=p.onLv?'var(--blu)':p.ck>=3?'var(--grn)':'var(--acc)';
    return `<div class="mc" style="${isMe?'border-color:'+c.c+';':''}">
      <div class="mchdr"><div class="mcl">
        <div class="av" style="width:32px;height:32px;font-size:12px;background:${c.bg};color:${c.c}">${m.name[0]}</div>
        <div><div class="mcname">${m.name}${isMe?' <span style="font-size:10px;color:var(--t3)">(我)</span>':''}</div>
        <div class="mcrole">${m.recorder?'★ 記錄員':''}</div></div></div>
        <div class="mcpills">${pills}</div></div>
      <div class="prog"><div class="progf" style="width:${pct}%;background:${bc}"></div></div>
      <div class="mini">${mini}</div></div>`;
  }).join('');
}

// ── LEADERBOARD ──────────────────────────
function renderLb(){
  const months=allMonths();
  if(!months.length){ document.getElementById('ranklist').innerHTML='<p style="color:var(--t3);font-size:13px;padding:1rem 0">尚無紀錄</p>'; return; }
  if(!lbMk||!months.includes(lbMk)) lbMk=months[months.length-1];
  document.getElementById('mtabs').innerHTML=
    months.map(mk=>`<button class="mtab${mk===lbMk?' on':''}" onclick="setLbMk('${mk}')">${mlabel(mk)}</button>`).join('')
    +`<button class="mtab${lbMk==='all'?' on':''}" onclick="setLbMk('all')">全部累積</button>`;

  const isAll=lbMk==='all',tgtM=isAll?months:[lbMk],wks=allWeeks();
  const scores=D.members.map((m,i)=>{
    let ck=0,miss=0,lv=0,amt=0;
    tgtM.forEach(mk=>wks.filter(w=>mkey(w)===mk).forEach(mon=>{ const days=wkDays(mon),p=pen(m.id,mon,days); if(p.onLv)lv++;else{ck+=p.ck;if(p.ended)miss+=p.miss;} amt+=p.amt; }));
    return {m,i,ck,miss,lv,amt,score:ck*10-miss*15+lv*5};
  }).sort((a,b)=>b.score-a.score);

  let totCk=0,totAmt=0,totLv=0;
  scores.forEach(s=>{ totCk+=s.ck; totAmt+=s.amt; totLv+=s.lv; });
  document.getElementById('lbstats').innerHTML=
    `<div class="scard"><div class="sclbl">總打卡</div><div class="scval cg">${totCk}</div></div>`
    +`<div class="scard"><div class="sclbl">總罰款</div><div class="scval cr">NT$${totAmt}</div></div>`
    +`<div class="scard"><div class="sclbl">請假次數</div><div class="scval co">${totLv}</div></div>`
    +`<div class="scard"><div class="sclbl">參與人數</div><div class="scval ca">${D.members.length}</div></div>`;

  const wkList=isAll?wks:wks.filter(w=>mkey(w)===lbMk);
  document.getElementById('ranklist').innerHTML=scores.map((s,rank)=>{
    const c=col(s.i),medal=rank<3?MEDALS[rank]:(rank+1);
    const dots=wkList.slice(-8).map(mon=>{ const days=wkDays(mon),p=pen(s.m.id,mon,days);
      if(p.onLv) return '<div class="sdot2 lv2"></div>';
      if(!p.ended) return '<div class="sdot2"></div>';
      return p.miss===0?'<div class="sdot2 hit"></div>':'<div class="sdot2 miss"></div>';
    }).join('');
    const endedWks=wkList.filter(w=>{ const p2=pen(s.m.id,w,wkDays(w)); return p2.ended&&!p2.onLv; });
    let badge='';
    if(endedWks.length>0&&s.miss===0) badge='<span class="rbadge" style="background:rgba(61,255,173,.15);color:var(--grn)">全勤 ✨</span>';
    else if(endedWks.length>0&&s.ck===0) badge='<span class="rbadge" style="background:rgba(255,82,82,.15);color:var(--red)">需加油 💸</span>';
    return `<div class="rcard r${rank+1}" style="${rank===0?'border-color:rgba(255,215,0,.25)':''}">
      <div class="rnum">${medal}</div>
      <div class="av" style="width:40px;height:40px;font-size:16px;background:${c.bg};color:${c.c}">${s.m.name[0]}</div>
      <div class="rinfo"><div class="rname">${s.m.name} ${badge}</div>
      <div class="rdetail">打卡 ${s.ck} 次・缺席 ${s.miss} 次・請假 ${s.lv} 週</div>
      <div class="sbar">${dots}</div></div>
      <div class="rright"><div class="rscore ${s.amt>0?'cr':'cg'}">NT$${s.amt}</div>
      <div class="rscl">累積罰款</div></div></div>`;
  }).join('');
}
function setLbMk(mk){ lbMk=mk; renderLb(); }
window.setLbMk=setLbMk;

// ── ACTIONS ──────────────────────────────
function tapDay(dk){ setSt(me,dk,getSt(me,dk)?null:'checked'); push().then(()=>toast(getSt(me,dk)?'✓ 打卡成功':'已清除')); }
function openCk(){
  if(document.getElementById('btnck').disabled) return;
  const t=new Date(); t.setHours(0,0,0,0);
  const mon=getMon(wkOff),days=wkDays(mon);
  if(isLv(me,mon)){ toast('本週已請假'); return; }
  const past=days.filter(d=>d<=t);
  document.getElementById('ckopts').innerHTML=past.map(d=>{
    const dk=fmt(d),st=getSt(me,dk),idx=days.indexOf(d);
    return `<button class="mopt${st==='checked'?' sok':''}" data-date="${dk}" onclick="togCk(this)">${DAYS[idx]} ${d.getDate()}日${st==='checked'?' ✓':''}</button>`;
  }).join('');
  document.getElementById('ovlck').classList.add('on');
}
function togCk(el){ el.classList.toggle('sok'); const b=el.textContent.replace(' ✓',''); el.textContent=el.classList.contains('sok')?b+' ✓':b; }
function confirmCk(){
  document.querySelectorAll('#ckopts .mopt').forEach(el=>{
    const dk=el.dataset.date;
    if(el.classList.contains('sok')) setSt(me,dk,'checked');
    else if(getSt(me,dk)==='checked') setSt(me,dk,null);
  });
  push().then(()=>{ closeAll(); renderApp(); toast('已儲存 ✓'); });
}
function doLeave(){
  if(document.getElementById('btnlv').disabled) return;
  const mon=getMon(wkOff),was=isLv(me,mon);
  if(toggleLv(me,mon)) push().then(()=>{ renderApp(); toast(was?'已取消請假':'📋 本週請假，免罰款'); });
}
function clearToday(){ const t=new Date(); t.setHours(0,0,0,0); setSt(me,fmt(t),null); push().then(()=>{ renderApp(); toast('已清除今日'); }); }
function chWk(d){ const n=wkOff+d; if(n>0||getMon(n)<WEEK1) return; wkOff=n; renderApp(); }

// ── SETTINGS ─────────────────────────────
function openSet(){
  document.getElementById('setlist').innerHTML=D.members.map((m,i)=>{
    const c=col(i);
    return `<div class="serow">
      <div class="av" style="width:28px;height:28px;font-size:11px;background:${c.bg};color:${c.c}">${m.name[0]}</div>
      <input id="si-${m.id}" value="${m.name}" maxlength="8">
      ${m.recorder?'<span style="font-size:10px;color:var(--t3);flex-shrink:0">記錄員</span>':`<button class="delbtn" onclick="setDel('${m.id}')">✕</button>`}
    </div>`;
  }).join('');
  document.getElementById('setnew').value='';
  document.getElementById('ovlset').classList.add('on');
}
function setDel(id){
  if(id===me){ toast('不能刪除自己'); return; }
  if(D.members.length<=1){ toast('至少需要 1 位成員'); return; }
  D.members=D.members.filter(m=>m.id!==id); openSet();
}
function setAdd(){
  const nm=(document.getElementById('setnew').value||'').trim();
  if(!nm){ toast('請輸入姓名'); return; }
  if(D.members.length>=8){ toast('最多 8 位成員'); return; }
  D.members.push({id:'u'+Date.now(),name:nm,recorder:false});
  document.getElementById('setnew').value='';
  openSet(); toast('已新增 '+nm);
}
function setSave(){
  D.members.forEach(m=>{ const e=document.getElementById('si-'+m.id); if(e){ const v=e.value.trim(); if(v) m.name=v; } });
  push().then(()=>{ closeAll(); if(me) document.getElementById('tbnm').textContent=getM(me).name||''; renderApp(); renderLogin(); toast('設定已儲存'); });
}
