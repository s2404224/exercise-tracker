<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天不練，明天掏錢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
<link rel="modulepreload" href="js/main.js">
<link rel="modulepreload" href="js/state.js">
<link rel="modulepreload" href="js/constants.js">
<link rel="modulepreload" href="js/helpers.js">
<link rel="modulepreload" href="js/ui.js">
<link rel="modulepreload" href="js/actions.js">
<link rel="modulepreload" href="js/firebase.js">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0c0c0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="運動打卡">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="ldtxt" id="ldtxt">連線中…</div>
</div>

<!-- LOGIN -->
<div id="pg-login" class="page">
  <div class="llogo">運動打卡系統</div>
  <h1 class="ltitle">今天不練，<br>明天掏錢</h1>
  <p class="lsub">點選你的名字進入打卡</p>
  <div class="mcards" id="mgrid"></div>
</div>

<!-- PIN OVERLAY -->
<div class="ovl" id="ovl-pin">
  <div class="pin-modal">
    <div class="pin-title" id="pin-title">輸入密碼</div>
    <div class="pin-sub" id="pin-sub">請輸入你的 4 位數密碼</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="numpad">
      <button class="npbtn" onclick="pinKey('1')">1</button>
      <button class="npbtn" onclick="pinKey('2')">2</button>
      <button class="npbtn" onclick="pinKey('3')">3</button>
      <button class="npbtn" onclick="pinKey('4')">4</button>
      <button class="npbtn" onclick="pinKey('5')">5</button>
      <button class="npbtn" onclick="pinKey('6')">6</button>
      <button class="npbtn" onclick="pinKey('7')">7</button>
      <button class="npbtn" onclick="pinKey('8')">8</button>
      <button class="npbtn" onclick="pinKey('9')">9</button>
      <button class="npbtn" onclick="pinKey('cancel')" style="font-size:12px;color:var(--t2)">取消</button>
      <button class="npbtn" onclick="pinKey('0')">0</button>
      <button class="npbtn del" onclick="pinKey('del')">⌫</button>
    </div>
  </div>
</div>

<!-- SYSTEM PASSWORD MODAL -->
<div class="ovl" id="ovl-syspwd">
  <div class="pin-modal">
    <div class="pin-title" id="syspwd-title">系統驗證</div>
    <div class="pin-sub" id="syspwd-sub">請輸入系統密碼</div>
    <div class="pin-dots" id="syspwd-dots">
      <div class="pin-dot" id="sp0"></div>
      <div class="pin-dot" id="sp1"></div>
      <div class="pin-dot" id="sp2"></div>
      <div class="pin-dot" id="sp3"></div>
    </div>
    <div class="pin-err" id="syspwd-err"></div>
    <div class="numpad">
      <button class="npbtn" onclick="spKey('1')">1</button>
      <button class="npbtn" onclick="spKey('2')">2</button>
      <button class="npbtn" onclick="spKey('3')">3</button>
      <button class="npbtn" onclick="spKey('4')">4</button>
      <button class="npbtn" onclick="spKey('5')">5</button>
      <button class="npbtn" onclick="spKey('6')">6</button>
      <button class="npbtn" onclick="spKey('7')">7</button>
      <button class="npbtn" onclick="spKey('8')">8</button>
      <button class="npbtn" onclick="spKey('9')">9</button>
      <button class="npbtn" onclick="spKey('cancel')" style="font-size:12px;color:var(--t2)">取消</button>
      <button class="npbtn" onclick="spKey('0')">0</button>
      <button class="npbtn del" onclick="spKey('del')">⌫</button>
    </div>
  </div>
</div>

<!-- NEW MEMBER SETUP MODAL -->
<div class="ovl" id="ovl-newmember">
  <div class="modal">
    <div class="mtitle">新增成員</div>
    <div class="msub">設定姓名與個人密碼</div>
    <div class="setup-field">
      <label class="setup-label">姓名（最多 8 字）</label>
      <input class="setup-input" id="nm-name" placeholder="輸入你的名字" maxlength="8">
    </div>
    <div class="setup-field">
      <label class="setup-label">設定 4 位數密碼（選填）</label>
      <input class="setup-input" id="nm-pin" placeholder="不設密碼可留空" maxlength="4" type="tel" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
    </div>
    <div class="setup-field">
      <label class="setup-label">確認密碼</label>
      <input class="setup-input" id="nm-pin2" placeholder="不設密碼可留空" maxlength="4" type="tel" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
    </div>
    <div class="macts">
      <button class="mcancel" onclick="closeAll()">取消</button>
      <button class="mconfirm" onclick="confirmNewMember()">建立帳號</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="pg-app" class="page">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-dot"></div>
      <span class="tb-brand">今天不練，明天掏錢</span>
    </div>
    <div class="tb-tabs">
      <button class="tbtab on" id="tbbck" onclick="showTab('ck')">📅 打卡</button>
      <button class="tbtab" id="tbblb" onclick="showTab('lb')">🏆 排行榜</button>
    </div>
    <div class="tb-r">
      <div class="sdot" id="sdot"></div>
      <span class="tb-user">Hi <strong id="tbnm"></strong></span>
      <button class="smbtn" onclick="openSet()">⚙</button>
      <button class="smbtn" onclick="doLogout()">切換</button>
    </div>
  </div>

  <div id="tab-ck" class="tab on">
    <div class="wrap">
      <div class="wknav">
        <button class="wkbtn" id="btn-prev" onclick="chWk(-1)">‹</button>
        <div class="wkinfo">
          <div class="wklbl" id="wklbl"></div>
          <div class="wkdates" id="wkdates"></div>
          <div class="wkhint" id="wkhint"></div>
        </div>
        <button class="wkbtn" id="btn-next" onclick="chWk(1)">›</button>
      </div>
      <div class="cards">
        <div class="card"><div class="clbl">我的本週</div><div class="cval ca" id="cmy">0/3</div></div>
        <div class="card"><div class="clbl">本週要繳</div><div class="cval cr" id="cfine">NT$0</div></div>
        <div class="card"><div class="clbl">全員罰款</div><div class="cval co" id="ctot">NT$0</div></div>
      </div>
      <div class="sec" id="mysec"></div>
      <div class="mycard">
        <div class="myhdr">
          <div class="myl">
            <div class="av" id="myav" style="width:36px;height:36px;font-size:14px"></div>
            <div>
              <div style="font-size:14px;font-weight:600" id="mynm"></div>
              <div style="font-size:10px;color:var(--t3)" id="myrole"></div>
            </div>
          </div>
          <div style="font-size:13px;color:var(--t2)">本週 <strong id="myn" style="color:var(--t)">0</strong>/<span id="myneed">3</span></div>
        </div>
        <div class="banner" id="banner">
          <div class="bnrow">
            <div><div class="bntag" id="bntag"></div><div class="bndesc" id="bndesc"></div><div class="bnnote" id="bnnote"></div></div>
            <div class="bnamt" id="bnamt"></div>
          </div>
        </div>
        <div class="dgrid" id="mydays"></div>
        <div class="arow">
          <button class="abtn ap" id="btnck" onclick="openCk()">＋ 打卡</button>
          <button class="abtn ab" id="btnlv-p" onclick="doLeave('personal')">📋 事假</button>
          <button class="abtn ab" id="btnlv-s" onclick="doLeave('sick')">🤒 病假</button>
          <button class="abtn ad" id="btnclr" style="display:none" onclick="clearToday()">✕ 清除今日</button>
        </div>
      </div>
      <div class="sec">所有成員進度</div>
      <div class="mlist" id="mlist"></div>
    </div>
  </div>

  <div id="tab-lb" class="tab">
    <div class="lbwrap">
      <div class="lbtitle">🏆 排行榜</div>
      <div class="lbsub">綠點=達標・藍點=請假・紅點=缺席</div>
      <div id="lbsummary"></div>
      <div class="sec" style="margin-top:1.5rem">個人排行（7 月起）</div>
      <div class="mtabs" id="mtabs"></div>
      <div id="pay-action"></div>
      <div class="stat4" id="lbstats"></div>
      <div class="sec">成員排名</div>
      <div id="ranklist"></div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="ovl" id="ovlck">
  <div class="modal">
    <div class="mtitle">新增打卡</div>
    <div class="msub">選擇已完成運動的日期</div>
    <div class="mopts" id="ckopts"></div>
    <div class="macts">
      <button class="mcancel" onclick="closeAll()">取消</button>
      <button class="mconfirm" onclick="confirmCk()">確認</button>
    </div>
  </div>
</div>

<div class="ovl" id="ovlset">
  <div class="modal">
    <div class="mtitle">個人設定</div>
    <div class="msub">修改你的名稱或密碼</div>
    <div class="setup-field">
      <label class="setup-label">姓名</label>
      <input class="setup-input" id="set-name" maxlength="8">
    </div>
    <div style="height:1px;background:var(--b);margin:14px 0"></div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:10px">密碼設定（留空表示不改）</div>
    <div class="setup-field">
      <label class="setup-label">新密碼（4 位數字）</label>
      <input class="setup-input" id="set-pin1" placeholder="輸入新密碼" maxlength="4" type="tel" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
    </div>
    <div class="setup-field">
      <label class="setup-label">確認新密碼</label>
      <input class="setup-input" id="set-pin2" placeholder="再輸入一次" maxlength="4" type="tel" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
    </div>
    <div style="margin-top:4px;margin-bottom:4px">
      <button onclick="removePin()" style="width:100%;padding:9px;background:transparent;border:1px solid rgba(255,82,82,.25);border-radius:6px;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s" onmouseover="this.style.background='rgba(255,82,82,.08)'" onmouseout="this.style.background='transparent'">✕ 移除密碼，改回免密碼登入</button>
    </div>
    <div id="set-restore-wrap" style="display:none">
      <div style="font-size:11px;color:var(--t2);margin:10px 0 8px">⚙️ 管理工具（管理員）</div>
      <div style="margin-bottom:6px">
        <button onclick="downloadBackup()" style="width:100%;padding:9px;background:transparent;border:1px solid rgba(61,255,173,.3);border-radius:6px;color:var(--grn);font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s" onmouseover="this.style.background='rgba(61,255,173,.08)'" onmouseout="this.style.background='transparent'">⬇️ 下載所有打卡資料（JSON 備份）</button>
      </div>
      <div style="margin-bottom:4px">
        <button onclick="reqSysPwd('restore')" style="width:100%;padding:9px;background:transparent;border:1px solid rgba(82,184,255,.25);border-radius:6px;color:var(--blu);font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s" onmouseover="this.style.background='rgba(82,184,255,.08)'" onmouseout="this.style.background='transparent'">🔄 從最近備份還原資料</button>
      </div>
    </div>
    <div class="macts" style="margin-top:10px">
      <button class="mcancel" onclick="closeAll()">取消</button>
      <button class="mconfirm" onclick="setSave()">儲存</button>
    </div>
  </div>
</div>

<div class="ovl" id="ovl-payment">
  <div class="modal">
    <div class="mtitle">💰 繳款記錄</div>
    <div class="msub" id="pay-sub"></div>
    <div id="pay-list" style="margin-bottom:8px"></div>
    <div class="macts">
      <button class="mcancel" onclick="closeAll()">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="mob-tabs" id="mob-tabs">
  <button class="mob-tab on" id="mob-tbbck" onclick="showTab('ck')">
    <div class="mob-tab-icon">📅</div><div>打卡</div>
  </button>
  <button class="mob-tab" id="mob-tbblb" onclick="showTab('lb')">
    <div class="mob-tab-icon">🏆</div><div>排行榜</div>
  </button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
